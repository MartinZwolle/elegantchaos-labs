  <circle cx="215" cy="161" r="2" fill="#9be27d"/>
  <circle cx="223" cy="161" r="2" fill="#9be27d"/>
  <circle cx="231" cy="161" r="2" fill="#9be27d"/>

  <!-- dotted connections -->
  <line x1="178" y1="120"
