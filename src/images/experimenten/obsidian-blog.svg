<svg width="320" height="240" viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="240" rx="28" fill="#151719"/>

  <!-- Obsidian crystal -->
  <polygon
    points="60,70 88,38 116,72 108,122 74,148 48,112"
    fill="#6f5bd6"
    stroke="#d8d8ff"
    stroke-width="3"/>

  <!-- Git branch -->
  <circle cx="170" cy="74" r="8" fill="#9be27d"/>
  <circle cx="170" cy="120" r="8" fill="#9be27d"/>
  <circle cx="210" cy="98" r="8" fill="#9be27d"/>

  <line x1="170" y1="74" x2="170" y2="120"
